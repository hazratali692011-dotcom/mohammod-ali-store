<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammod Ali Store</title>

<style>

body{
font-family:Segoe UI;
margin:0;
padding:10px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.marquee{
overflow:hidden;
white-space:nowrap;
margin-bottom:10px;
}

.marquee h1{
display:inline-block;
padding-left:100%;
animation:moveText 12s linear infinite;
font-size:30px;
color:white;
text-shadow:0 0 10px black;
}

@keyframes moveText{
0%{transform:translateX(0%);opacity:0.5;}
50%{opacity:1;color:#ffe600;}
100%{transform:translateX(-100%);opacity:0.5;}
}

.card{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2,h3{
text-align:center;
margin:5px 0 10px;
}

.summary-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.summary-box{
background:#f8f9fa;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:bold;
font-size:15px;
}

.top-search{
display:flex;
gap:5px;
margin-bottom:10px;
}

.top-search input{
flex:1;
}

input,select,button{
height:42px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:14px;
width:100%;
margin:4px 0;
}

button{
background:#007bff;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

.menu{
display:flex;
gap:5px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:10px;
}

.menu button{
width:auto;
padding:8px 10px;
font-size:12px;
height:38px;
}

.clear-btn{background:#dc3545;width:80px;}
.back-btn{background:#28a745;}
.print-btn{background:#28a745;}
.edit-btn{background:#ffc107;color:black;}
.delete-btn{background:#dc3545;}
.save-btn{background:#17a2b8;}

.section{display:none;}
.active{display:block;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
vertical-align:middle;
font-size:12px;
}

th{
background:#007bff;
color:white;
}

.action-btn{
display:flex;
justify-content:center;
gap:3px;
flex-wrap:wrap;
}

.action-btn button{
width:auto;
height:auto;
padding:5px 7px;
font-size:11px;
}

.current-due-box{
background:#ffeeba;
padding:10px;
border-radius:8px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="marquee">
<h1>Mohammod Ali Store</h1>
</div>

<div class="card">

<h2>Dashboard</h2>

<div class="summary-grid">

<div class="summary-box">
Date: <span id="todayDate"></span><br>
Total Sell: <span id="totalSell">0</span>
</div>

<div class="summary-box">
Nagad Sell: <span id="nagadSell">0</span><br>
Due Sell: <span id="dueSell">0</span>
</div>

</div>

<div class="summary-box">
Total Current Due: <span id="totalDue">0</span> Tk
</div>

<div class="top-search">
<input id="searchCustomer" placeholder="Search Customer" onkeyup="showDashboard()">
<button class="clear-btn" onclick="clearSearch()">Clear</button>
</div>

<div class="menu">
<button onclick="showSection('customerSection')">Customer</button>
<button onclick="showSection('dueSection')">Due</button>
<button onclick="showSection('paymentSection')">Payment</button>
<button onclick="showSection('cashSection')">Nagad Sell</button>
<button onclick="showSection('transactionSection')">Transactions</button>
<button onclick="showSection('dueListSection')">Current Due</button>
<button onclick="showSection('profileSection')">Profile</button>
</div>

<table id="dashboardTable"></table>

</div>
<div id="customerSection" class="card section">

<h3>Customer Registration</h3>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone Number">
<input id="area" placeholder="Area">

<button onclick="saveCustomer()">Save Customer</button>
<button class="back-btn" onclick="goDashboard()">Back Dashboard</button>

</div>

<div id="dueSection" class="card section">

<h3>Due Entry</h3>

<select id="customer"></select>

<input id="product" placeholder="Product Name">
<input id="qty" placeholder="Quantity">
<input id="amount" placeholder="Amount">

<select id="dueAuthor">
<option value="">Select Author</option>
<option>Hashem</option>
<option>Rozina</option>
<option>Mohammad</option>
<option>Hazrat</option>
</select>

<button onclick="saveDue()">Save Due</button>
<button class="back-btn" onclick="goDashboard()">Back Dashboard</button>

</div>

<div id="paymentSection" class="card section">

<h3>Payment Entry</h3>

<select id="payCustomer" onchange="showCurrentDue()"></select>

<div class="current-due-box">
Current Due: <span id="paymentDue">0</span> Tk
</div>

<input id="payAmount" placeholder="Payment Amount">

<select id="paymentAuthor">
<option value="">Received By</option>
<option>Hashem</option>
<option>Rozina</option>
<option>Mohammad</option>
<option>Hazrat</option>
</select>

<button onclick="savePayment()">Save Payment</button>
<button class="back-btn" onclick="goDashboard()">Back Dashboard</button>

</div>

<div id="cashSection" class="card section">

<h3>Nagad Sell</h3>

<input id="cashCustomer" placeholder="Customer Name">
<input id="cashProduct" placeholder="Product Name">
<input id="cashQty" placeholder="Quantity">
<input id="cashAmount" placeholder="Amount">

<select id="cashAuthor">
<option value="">Select Author</option>
<option>Hashem</option>
<option>Rozina</option>
<option>Mohammad</option>
<option>Hazrat</option>
</select>

<button onclick="saveCashSell()">Save Nagad Sell</button>
<button class="back-btn" onclick="goDashboard()">Back Dashboard</button>

<hr>

<h3>Nagad Sell Report</h3>

<div class="top-search">
<input type="date" id="cashFilterDate" onchange="showCashSell()">
<button class="clear-btn" onclick="clearCashSearch()">Clear</button>
</div>

<button class="print-btn" onclick="printCashSell()">Print A4</button>

<table id="cashTable"></table>

</div>

<div id="transactionSection" class="card section">

<h3>All Transactions</h3>

<div class="top-search">
<input type="date" id="filterDate" onchange="showTransactions()">
<button class="clear-btn" onclick="clearTransactionSearch()">Clear</button>
</div>

<button class="print-btn" onclick="printTransactions()">Print A4</button>
<button class="back-btn" onclick="goDashboard()">Back Dashboard</button>

<table id="transactionTable"></table>

</div>

<div id="dueListSection" class="card section">

<h3>All Current Due</h3>

<button class="print-btn" onclick="printDueList()">Print A4</button>
<button class="back-btn" onclick="goDashboard()">Back Dashboard</button>

<table id="dueTable"></table>

</div>

<div id="profileSection" class="card section">

<h3>Customer Profile</h3>

<input id="profileSearch" placeholder="Search By Name" onkeyup="showProfile()">

<button class="back-btn" onclick="goDashboard()">Back Dashboard</button>

<div id="profileData"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbx41M1V677XdN0U3XbbFiUDbeVC5TRsfkiKqYZkp1T9TsBH8NXJKVRRAc9IlkPMdfxl/exec";

let customers = JSON.parse(localStorage.getItem('customers')) || [];
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
let cashSell = JSON.parse(localStorage.getItem('cashSell')) || [];

function saveData(){

localStorage.setItem('customers',JSON.stringify(customers));
localStorage.setItem('transactions',JSON.stringify(transactions));
localStorage.setItem('cashSell',JSON.stringify(cashSell));

}

function formatCustomerId(id){
return String(id).padStart(3,'0');
}

function formatTransactionId(id){
return String(id).padStart(2,'0');
}

function getOnlyDate(dateString){

let d = new Date(dateString);

let y = d.getFullYear();
let m = String(d.getMonth()+1).padStart(2,'0');
let da = String(d.getDate()).padStart(2,'0');

return `${y}-${m}-${da}`;

}

function showSection(id){

document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));

document.getElementById(id).classList.add('active');

window.scrollTo({top:0,behavior:'smooth'});

}

function goDashboard(){

document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));

window.scrollTo({top:0,behavior:'smooth'});

}

function clearSearch(){

document.getElementById('searchCustomer').value='';

showDashboard();

}

function clearTransactionSearch(){

document.getElementById('filterDate').value='';

showTransactions();

}

function clearCashSearch(){

document.getElementById('cashFilterDate').value='';

showCashSell();

}
function getNextCustomerId(){

if(customers.length===0)return 101;

return Math.max(...customers.map(c=>Number(c.id)))+1;

}

function getNextTransactionId(){

let ids = transactions.map(t=>Number(t.id));

let id = 1;

while(ids.includes(id)){
id++;
}

return id;

}

function saveCustomer(){

let name=document.getElementById('name').value.trim();
let phone=document.getElementById('phone').value.trim();
let area=document.getElementById('area').value.trim();

if(!name){
alert('Customer Name Required');
return;
}

let customer={
id:getNextCustomerId(),
name,
phone,
area,
due:0,
registerDate:new Date().toLocaleString()
};

customers.push(customer);

saveData();

loadDropdown();

showDashboard();
showDueList();
updateTotalDue();

fetch(scriptURL,{
method:'POST',
body:JSON.stringify({action:'saveCustomer',...customer})
});

document.getElementById('name').value='';
document.getElementById('phone').value='';
document.getElementById('area').value='';

alert('Customer Saved');

}

function loadDropdown(){

let customer=document.getElementById('customer');
let payCustomer=document.getElementById('payCustomer');

customer.innerHTML="<option value=''>Select Customer</option>";
payCustomer.innerHTML="<option value=''>Select Customer</option>";

customers.forEach(c=>{

customer.innerHTML += `<option value="${c.id}">${formatCustomerId(c.id)} - ${c.name}</option>`;

payCustomer.innerHTML += `<option value="${c.id}">${formatCustomerId(c.id)} - ${c.name}</option>`;

});

}

function saveDue(){

let customerId=document.getElementById('customer').value;
let product=document.getElementById('product').value.trim();
let qty=document.getElementById('qty').value.trim();
let amount=document.getElementById('amount').value.trim();
let author=document.getElementById('dueAuthor').value;

if(!customerId || !product || !qty || !amount || !author){

alert('Fill All Fields');

return;

}

let customer=customers.find(c=>c.id==customerId);

customer.due += Number(amount);

let transaction={

id:getNextTransactionId(),
customerId,
customerName:customer.name,
type:'Due',
product,
qty,
amount,
author,
date:new Date().toLocaleString()

};

transactions.push(transaction);

saveData();

showDashboard();
showTransactions();
showDueList();
updateTotalDue();
updateDailySummary();

fetch(scriptURL,{
method:'POST',
body:JSON.stringify({action:'saveTransaction',...transaction})
});

document.getElementById('product').value='';
document.getElementById('qty').value='';
document.getElementById('amount').value='';
document.getElementById('dueAuthor').value='';

alert('Due Added');

}

function showCurrentDue(){

let customerId=document.getElementById('payCustomer').value;

let customer=customers.find(c=>c.id==customerId);

document.getElementById('paymentDue').innerText = customer ? customer.due : 0;

}

function savePayment(){

let customerId=document.getElementById('payCustomer').value;
let amount=document.getElementById('payAmount').value.trim();
let author=document.getElementById('paymentAuthor').value;

if(!customerId || !amount || !author){

alert('Fill All Fields');

return;

}

let customer=customers.find(c=>c.id==customerId);

customer.due -= Number(amount);

let transaction={

id:getNextTransactionId(),
customerId,
customerName:customer.name,
type:'Payment',
product:'-',
qty:'-',
amount,
author,
date:new Date().toLocaleString()

};

transactions.push(transaction);

saveData();

showDashboard();
showTransactions();
showDueList();
updateTotalDue();

fetch(scriptURL,{
method:'POST',
body:JSON.stringify({action:'saveTransaction',...transaction})
});

document.getElementById('payAmount').value='';
document.getElementById('paymentAuthor').value='';

alert('Payment Saved');

}

function saveCashSell(){

let customer=document.getElementById('cashCustomer').value.trim();
let product=document.getElementById('cashProduct').value.trim();
let qty=document.getElementById('cashQty').value.trim();
let amount=document.getElementById('cashAmount').value.trim();
let author=document.getElementById('cashAuthor').value;

if(!product || !qty || !amount || !author){

alert('Fill All Fields');

return;

}

let sell={

id:Date.now(),
customer,
product,
qty,
amount,
author,
date:new Date().toLocaleString()

};

cashSell.push(sell);

saveData();

updateDailySummary();

fetch(scriptURL,{
method:'POST',
body:JSON.stringify({action:'saveCashSell',...sell})
});

document.getElementById('cashCustomer').value='';
document.getElementById('cashProduct').value='';
document.getElementById('cashQty').value='';
document.getElementById('cashAmount').value='';
document.getElementById('cashAuthor').value='';

showCashSell();

alert('Nagad Sell Saved');

}

function showDashboard(){

let s=document.getElementById('searchCustomer').value.toLowerCase();

let table=document.getElementById('dashboardTable');

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Area</th>
<th>Due</th>
<th>Action</th>
</tr>`;

customers.forEach(c=>{

if(c.name.toLowerCase().includes(s) || c.phone.includes(s)){

table.innerHTML += `
<tr>
<td>${formatCustomerId(c.id)}</td>
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.area}</td>
<td>${c.due}</td>
<td>
<div class="action-btn">
<button class="edit-btn">Edit</button>
<button class="save-btn">Save</button>
<button class="delete-btn" onclick="deleteCustomer('${c.id}')">Delete</button>
</div>
</td>
</tr>`;

}

});

}

function showTransactions(){

let table=document.getElementById('transactionTable');

let date=document.getElementById('filterDate').value;

table.innerHTML=`
<tr>
<th>ID</th>
<th>Customer</th>
<th>Type</th>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Author</th>
<th>Date</th>
<th>Action</th>
</tr>`;

transactions.forEach(t=>{

let rowDate = getOnlyDate(t.date);

if(date==='' || rowDate===date){

table.innerHTML += `
<tr>
<td>${formatTransactionId(t.id)}</td>
<td>${t.customerName}</td>
<td>${t.type}</td>
<td>${t.product}</td>
<td>${t.qty}</td>
<td>${t.amount}</td>
<td>${t.author || '-'}</td>
<td>${t.date}</td>
<td>
<div class="action-btn">
<button class="edit-btn">Edit</button>
<button class="save-btn">Save</button>
<button class="delete-btn" onclick="deleteTransaction('${t.id}')">Delete</button>
</div>
</td>
</tr>`;

}

});

}

function showCashSell(){

let table=document.getElementById('cashTable');

let date=document.getElementById('cashFilterDate').value;

table.innerHTML=`
<tr>
<th>ID</th>
<th>Customer</th>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Author</th>
<th>Date</th>
<th>Action</th>
</tr>`;

let total=0;

cashSell.forEach(c=>{

let rowDate = getOnlyDate(c.date);

if(date==='' || rowDate===date){

total += Number(c.amount);

table.innerHTML += `
<tr>
<td>${c.id}</td>
<td contenteditable='true'>${c.customer}</td>
<td contenteditable='true'>${c.product}</td>
<td contenteditable='true'>${c.qty}</td>
<td contenteditable='true'>${c.amount}</td>
<td>${c.author}</td>
<td>${c.date}</td>

<td>
<div class="action-btn">

<button class="edit-btn">
Edit
</button>

<button class="save-btn">
Save
</button>

<button class="delete-btn"
onclick="deleteCashSell('${c.id}')">
Delete
</button>

</div>
</td>

</tr>`;

}

});

table.innerHTML += `
<tr>
<th colspan="4">Total</th>
<th>${total}</th>
<th colspan="3"></th>
</tr>`;

}

function showProfile(){

let s=document.getElementById('profileSearch').value.toLowerCase();

let div=document.getElementById('profileData');

let html='';

customers.forEach(c=>{

if(c.name.toLowerCase().includes(s)){

html += `

<div class='card'>

<div style='display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;'>

<div>

<h3>${c.name}</h3>

<p><b>Customer ID:</b> ${formatCustomerId(c.id)}</p>

<p><b>Phone:</b> ${c.phone}</p>

<p><b>Area:</b> ${c.area}</p>

<p><b>Current Due:</b> ${c.due}</p>

</div>

<div class='action-btn'>

<button class='edit-btn'>
Update
</button>

<button class='save-btn'>
Save
</button>

<button class='delete-btn'
onclick="deleteCustomer('${c.id}')">
Delete
</button>

</div>

</div>

<table>

<tr>
<th>ID</th>
<th>Type</th>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>

`;

transactions.forEach(t=>{

if(t.customerId==c.id){

html += `

<tr>

<td>${formatTransactionId(t.id)}</td>

<td>${t.type}</td>

<td>${t.product}</td>

<td>${t.qty}</td>

<td>${t.amount}</td>

<td>${t.date}</td>

<td>

<div class='action-btn'>

<button class='edit-btn'>
Edit
</button>

<button class='save-btn'>
Save
</button>

<button class='delete-btn'
onclick="deleteTransaction('${t.id}')">
Delete
</button>

</div>

</td>

</tr>

`;

}

});

html += `
</table>
</div>
`;

}

});

div.innerHTML=html;

}

function showDueList(){

let table=document.getElementById('dueTable');

let total=0;

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Current Due</th>
</tr>`;

customers.forEach(c=>{

total += Number(c.due);

table.innerHTML += `
<tr>
<td>${formatCustomerId(c.id)}</td>
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.due}</td>
</tr>`;

});

table.innerHTML += `
<tr>
<th colspan="3">Grand Total</th>
<th>${total}</th>
</tr>`;

}

function updateTotalDue(){

let total=0;

customers.forEach(c=>{
total += Number(c.due);
});

document.getElementById('totalDue').innerText=total;

}

function updateDailySummary(){

let today=new Date().toLocaleDateString();

document.getElementById('todayDate').innerText=today;

let dueSell=0;

transactions.forEach(t=>{
if(t.type==='Due'){
dueSell += Number(t.amount);
}
});

let nagad=0;

cashSell.forEach(c=>{
nagad += Number(c.amount);
});

let total = dueSell + nagad;

document.getElementById('dueSell').innerText=dueSell;
document.getElementById('nagadSell').innerText=nagad;
document.getElementById('totalSell').innerText=total;

}

function deleteTransaction(id){
function deleteCashSell(id){

if(confirm('Delete Cash Sell?')){

cashSell = cashSell.filter(c=>c.id!=id);

saveData();

showCashSell();

updateDailySummary();

}

}

if(confirm('Delete Transaction?')){

transactions = transactions.filter(t=>t.id!=id);

saveData();

showTransactions();
showCashSell();

}

}

function deleteCustomer(id){

if(confirm('Delete Customer?')){

customers = customers.filter(c=>c.id!=id);

transactions = transactions.filter(t=>t.customerId!=id);

saveData();

loadDropdown();

showDashboard();
showTransactions();
showDueList();

updateTotalDue();

}

}

function printTransactions(){

let table=document.getElementById('transactionTable').cloneNode(true);

table.querySelectorAll('tr').forEach(row=>{
if(row.cells.length>8){
row.deleteCell(8);
}
});

let w=window.open();

let d=new Date().toLocaleString();

w.document.write(`
<h2 style='text-align:center;'>Mohammod Ali Store</h2>
<h3 style='text-align:center;'>Transaction Report</h3>
<p style='text-align:center;'>Print Date & Time: ${d}</p>

${table.outerHTML}

<style>
@page{size:A4;}
body{font-family:Arial;}
table{width:100%;border-collapse:collapse;}
th,td{
border:1px solid black;
padding:8px;
text-align:center;
vertical-align:middle;
}
</style>
`);

w.print();

}

function printCashSell(){

let w=window.open();

let d=new Date().toLocaleString();

w.document.write(`
<h2 style='text-align:center;'>Mohammod Ali Store</h2>
<h3 style='text-align:center;'>Nagad Sell Report</h3>
<p style='text-align:center;'>Print Date & Time: ${d}</p>

${document.getElementById('cashTable').outerHTML}

<style>
@page{size:A4;}
body{font-family:Arial;}
table{width:100%;border-collapse:collapse;}
th,td{
border:1px solid black;
padding:8px;
text-align:center;
vertical-align:middle;
}
</style>
`);

w.print();

}

function printDueList(){

let w=window.open();

let d=new Date().toLocaleString();

w.document.write(`
<h2 style='text-align:center;'>Mohammod Ali Store</h2>
<h3 style='text-align:center;'>Current Due Report</h3>
<p style='text-align:center;'>Print Date & Time: ${d}</p>

${document.getElementById('dueTable').outerHTML}

<style>
@page{size:A4;}
body{font-family:Arial;}
table{width:100%;border-collapse:collapse;}
th,td{
border:1px solid black;
padding:8px;
text-align:center;
vertical-align:middle;
}
</style>
`);

w.print();

}

loadDropdown();

showDashboard();
showTransactions();
showCashSell();
showDueList();

updateTotalDue();
updateDailySummary();

</script>

</body>
</html>
