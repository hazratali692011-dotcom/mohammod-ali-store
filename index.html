<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mohammod Ali Store</title>

<style>

body{
font-family:Segoe UI;
margin:0;
padding:10px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.card{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2,h3{
text-align:center;
margin:5px 0 10px;
}

.summary-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.summary-box{
padding:10px;
border-radius:10px;
font-weight:bold;
text-align:center;
font-size:16px;
}

.top-search{
display:flex;
gap:5px;
margin-bottom:10px;
}

.top-search input{
flex:1;
}

input,select,button{
height:42px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:14px;
width:100%;
margin:4px 0;
}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.menu{
display:flex;
gap:5px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:10px;
}

.menu button{
width:auto;
padding:8px 10px;
font-size:12px;
height:38px;
background:#007bff;
color:white;
}

.clear-btn{
background:#dc3545;
color:white;
width:80px;
}

.back-btn{
background:#28a745;
color:white;
}

.print-btn{
background:#28a745;
color:white;
}

.edit-btn{
background:#ffc107;
color:black;
}

.save-btn{
background:#17a2b8;
color:white;
}

.delete-btn{
background:#dc3545;
color:white;
}

.section{
display:none;
}

.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
vertical-align:middle;
font-size:12px;
}

th{
background:#007bff;
color:white;
}

.action-btn{
display:flex;
justify-content:center;
gap:3px;
flex-wrap:wrap;
}

.action-btn button{
width:auto;
height:auto;
padding:5px 7px;
font-size:11px;
}

.current-due-box{
background:#ffeeba;
padding:10px;
border-radius:8px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card">
<div class="card">

<marquee behavior="alternate"
direction="left"
scrollamount="10"
style="
font-size:28px;
font-weight:bold;
color:green;
margin-bottom:15px;
text-shadow:2px 2px 5px yellow;
">

 Mohammod Ali Store 

</marquee>

<h2>Dashboard</h2>

<div class="summary-grid">

<div class="summary-box"
style="background:#fff3cd;color:black;">

Current Date & Time<br>

<span id="todayDate"></span>

</div>

<div class="summary-box"
style="background:#6f42c1;color:white;">

Total Sell<br>

<span id="totalSell">0</span> Tk

</div>

<div class="summary-box"
style="background:#28a745;color:white;">

Nagad Sell<br>

<span id="nagadSell">0</span> Tk

</div>

<div class="summary-box"
style="background:#dc3545;color:white;">

Due Sell<br>

<span id="dueSell">0</span> Tk

</div>

</div>

<div class="summary-box"
style="background:red;color:white;font-size:18px;">

Current Total Due :
<span id="totalDue">0</span> Tk

</div>

<div class="top-search">

<input id="searchCustomer"
placeholder="Search Customer"
onkeyup="showDashboard()">

<button class="clear-btn"
onclick="clearSearch()">

Clear

</button>

</div>

<div class="menu">

<button onclick="showSection('customerSection')">
Customer
</button>

<button onclick="showSection('dueSection')">
Due
</button>

<button onclick="showSection('paymentSection')">
Payment
</button>

<button onclick="showSection('cashSection')">
Nagad Sell
</button>

<button onclick="showSection('transactionSection')">
Transactions
</button>

<button onclick="showSection('dueListSection')">
Current Due
</button>

<button onclick="showSection('profileSection')">
Profile
</button>

</div>

<table id="dashboardTable"></table>

</div>
<div id="customerSection"
class="card section">

<h3>Customer Registration</h3>

<input id="name"
placeholder="Customer Name">

<input id="phone"
placeholder="Phone Number">

<input id="area"
placeholder="Area">

<button onclick="saveCustomer()">
Save Customer
</button>

<button class="back-btn"
onclick="goDashboard()">

Back Dashboard

</button>

</div>

<div id="dueSection"
class="card section">

<h3>Due Entry</h3>

<select id="customer"></select>

<input id="product"
placeholder="Product Name">

<input id="qty"
placeholder="Quantity">

<input id="amount"
placeholder="Amount">

<select id="dueAuthor">

<option value="">
Select Author
</option>

<option>Hashem</option>
<option>Rozina</option>
<option>Mohammad</option>
<option>Hazrat</option>

</select>

<button onclick="saveDue()">
Save Due
</button>

<button class="back-btn"
onclick="goDashboard()">

Back Dashboard

</button>

</div>

<div id="paymentSection"
class="card section">

<h3>Payment Entry</h3>

<select id="payCustomer"
onchange="showCurrentDue()">
</select>

<div class="current-due-box">

Current Due :
<span id="paymentDue">0</span> Tk

</div>

<input id="payAmount"
placeholder="Payment Amount">

<select id="paymentAuthor">

<option value="">
Received By
</option>

<option>Hashem</option>
<option>Rozina</option>
<option>Mohammad</option>
<option>Hazrat</option>

</select>

<button onclick="savePayment()">
Save Payment
</button>

<button class="back-btn"
onclick="goDashboard()">

Back Dashboard

</button>

</div>

<div id="cashSection"
class="card section">

<h3>Nagad Sell</h3>

<input id="cashCustomer"
placeholder="Customer Name">

<input id="cashProduct"
placeholder="Product Name">

<input id="cashQty"
placeholder="Quantity">

<input id="cashAmount"
placeholder="Amount">

<select id="cashAuthor">

<option value="">
Select Author
</option>

<option>Hashem</option>
<option>Rozina</option>
<option>Mohammad</option>
<option>Hazrat</option>

</select>

<button onclick="saveCashSell()">
Save Nagad Sell
</button>

<button class="back-btn"
onclick="goDashboard()">

Back Dashboard

</button>

<hr>

<h3>Nagad Sell Report</h3>

<div class="top-search">

<input type="date"
id="cashFilterDate"
onchange="showCashSell()">

<button class="clear-btn"
onclick="clearCashSearch()">

Clear

</button>

</div>

<button class="print-btn"
onclick="printCashSell()">

Print A4

</button>

<table id="cashTable"></table>

</div>
<div id="transactionSection"
class="card section">

<h3>All Transactions</h3>

<div class="top-search">

<input type="date"
id="filterDate"
onchange="showTransactions()">

<button class="clear-btn"
onclick="clearTransactionSearch()">

Clear

</button>

</div>

<button class="print-btn"
onclick="printTransactions()">

Print A4

</button>

<button class="back-btn"
onclick="goDashboard()">

Back Dashboard

</button>

<table id="transactionTable"></table>

</div>

<div id="dueListSection"
class="card section">

<h3>All Current Due</h3>

<button class="print-btn"
onclick="printDueList()">

Print A4

</button>

<button class="back-btn"
onclick="goDashboard()">

Back Dashboard

</button>

<table id="dueTable"></table>

</div>

<div id="profileSection"
class="card section">

<h3>Customer Profile</h3>

<input id="profileSearch"
placeholder="Search By Name"
onkeyup="showProfile()">

<button class="back-btn"
onclick="goDashboard()">

Back Dashboard

</button>

<div id="profileData"></div>

</div>

<script>

const scriptURL ="https://script.google.com/macros/s/AKfycbx41M1V677XdN0U3XbbFiUDbeVC5TRsfkiKqYZkp1T9TsBH8NXJKVRRAc9IlkPMdfxl/exec";

let customers = [];

let transactions = [];

let cashSell = [];

let editCustomerId = null;

function saveData(){

}

function formatCustomerId(id){

return String(id).padStart(3,'0');

}

function formatTransactionId(id){

return String(id).padStart(2,'0');

}

function getOnlyDate(dateString){

let d = new Date(dateString);

let y = d.getFullYear();

let m =
String(d.getMonth()+1).padStart(2,'0');

let da =
String(d.getDate()).padStart(2,'0');

return `${y}-${m}-${da}`;

}

function showSection(id){

document.querySelectorAll('.section')
.forEach(sec=>sec.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function goDashboard(){

document.querySelectorAll('.section')
.forEach(sec=>sec.classList.remove('active'));

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function clearSearch(){

document.getElementById(
'searchCustomer'
).value='';

showDashboard();

}

function clearTransactionSearch(){

document.getElementById(
'filterDate'
).value='';

showTransactions();

}

function clearCashSearch(){

document.getElementById(
'cashFilterDate'
).value='';

showCashSell();

}

function getNextCustomerId(){

if(customers.length===0)
return 101;

return Math.max(
...customers.map(c=>Number(c.id))
)+1;

}

function getNextTransactionId(){

let ids =
transactions.map(t=>Number(t.id));

let id = 1;

while(ids.includes(id)){

id++;

}

return id;

}
function loadDropdown(){

let customer =
document.getElementById('customer');

let payCustomer =
document.getElementById('payCustomer');

customer.innerHTML =
"<option value=''>Select Customer</option>";

payCustomer.innerHTML =
"<option value=''>Select Customer</option>";

customers.forEach(c=>{

customer.innerHTML += `

<option value="${c.id}">
${formatCustomerId(c.id)} - ${c.name}
</option>

`;

payCustomer.innerHTML += `

<option value="${c.id}">
${formatCustomerId(c.id)} - ${c.name}
</option>

`;

});

}

function editCustomer(id){

let customer =
customers.find(c=>c.id==id);

document.getElementById('name').value =
customer.name;

document.getElementById('phone').value =
customer.phone;

document.getElementById('area').value =
customer.area;

editCustomerId = id;

showSection('customerSection');

}

function saveCustomer(){

let name =
document.getElementById('name').value.trim();

let phone =
document.getElementById('phone').value.trim();

let area =
document.getElementById('area').value.trim();

if(!name){

alert('Customer Name Required');

return;

}

if(editCustomerId){

let oldCustomer =
customers.find(c=>c.id==editCustomerId);

oldCustomer.name = name;
oldCustomer.phone = phone;
oldCustomer.area = area;

transactions.forEach(t=>{

if(t.customerId==editCustomerId){

t.customerName = name;

}

});

editCustomerId = null;

}else{

let customer={

id:getNextCustomerId(),
name,
phone,
area,
due:0,
registerDate:new Date().toLocaleString()

};

customers.push(customer);

}

saveData();
let currentCustomerId;

if(editCustomerId){

currentCustomerId = editCustomerId;

}else{

currentCustomerId =
customers[customers.length-1].id;

}
fetch(scriptURL,{
method:'POST',
body:JSON.stringify({
action:'saveCustomer',
id:String(currentCustomerId).padStart(3,'0'),
name,
phone,
area,
due:0,
registerDate:new Date().toLocaleString()
})
});

loadDropdown();

showDashboard();

showProfile();

showDueList();

updateTotalDue();

document.getElementById('name').value='';

document.getElementById('phone').value='';

document.getElementById('area').value='';

alert('Customer Saved Successfully');

}

function saveDue(){

let customerId =
document.getElementById('customer').value;

let product =
document.getElementById('product').value.trim();

let qty =
document.getElementById('qty').value.trim();

let amount =
document.getElementById('amount').value.trim();

let author =
document.getElementById('dueAuthor').value;

if(
!customerId ||
!product ||
!qty ||
!amount ||
!author
){

alert('Fill All Fields');

return;

}

let customer =
customers.find(c=>c.id==customerId);

customer.due += Number(amount);

let transaction={

id:getNextTransactionId(),

customerId,

customerName:customer.name,

type:'Due',

product,

qty,

amount,

author,

date:new Date().toLocaleString()

};

transactions.push(transaction);

fetch(scriptURL,{
method:'POST',
body:JSON.stringify({

action:'saveTransaction',

id:String(transaction.id).padStart(2,'0'),

customerId:String(customer.id).padStart(3,'0'),

customerName:customer.name,

type:transaction.type,

product:transaction.product,

qty:transaction.qty,

amount:transaction.amount,

author:transaction.author,

date:transaction.date

})
});

showTransactions();

showDueList();

showProfile();

showDashboard();

updateTotalDue();

updateDailySummary();

document.getElementById('product').value='';

document.getElementById('qty').value='';

document.getElementById('amount').value='';

document.getElementById('dueAuthor').value='';

alert('Due Added');

}

function showCurrentDue(){

let customerId =
document.getElementById('payCustomer').value;

let customer =
customers.find(c=>c.id==customerId);

if(customer){

document.getElementById('paymentDue')
.innerText = customer.due;

}else{

document.getElementById('paymentDue')
.innerText = 0;

}

}
function savePayment(){

let customerId =
document.getElementById('payCustomer').value;

let amount =
document.getElementById('payAmount').value.trim();

let author =
document.getElementById('paymentAuthor').value;

if(!customerId || !amount || !author){

alert('Fill All Fields');

return;

}

let customer =
customers.find(c=>c.id==customerId);

customer.due -= Number(amount);

let transaction={

id:getNextTransactionId(),

customerId:String(customer.id).padStart(3,'0'),

customerName:customer.name,

type:'Payment',

product:'-',

qty:'-',

amount,

author,

date:new Date().toLocaleString()

};

transactions.push(transaction);

saveData();

fetch(scriptURL,{
method:'POST',
body:JSON.stringify({

action:'saveTransaction',

id:String(transaction.id).padStart(2,'0'),

customerId:transaction.customerId,

customerName:transaction.customerName,

type:transaction.type,

product:transaction.product,

qty:transaction.qty,

amount:transaction.amount,

author:transaction.author,

date:transaction.date

})
});

showDashboard();

showTransactions();

showDueList();

showProfile();

updateTotalDue();

updateDailySummary();

document.getElementById('payAmount').value='';

document.getElementById('paymentAuthor').value='';

alert('Payment Saved');

}

function saveCashSell(){

let customer =
document.getElementById('cashCustomer').value.trim();

let product =
document.getElementById('cashProduct').value.trim();

let qty =
document.getElementById('cashQty').value.trim();

let amount =
document.getElementById('cashAmount').value.trim();

let author =
document.getElementById('cashAuthor').value;

if(!product || !qty || !amount || !author){

alert('Fill All Fields');

return;

}

let now = new Date();

let sell={

id:String(cashSell.length + 1).padStart(2,'0'),

customer,

product,

qty,

amount,

author,

date:new Date().toLocaleString()

};

cashSell.push(sell);

saveData();

fetch(scriptURL,{
method:'POST',
body:JSON.stringify({
action:'saveCashSell',
id:sell.id,
customer:sell.customer,
product:sell.product,
qty:sell.qty,
amount:sell.amount,
author:sell.author,
date:sell.date
}),
mode:'no-cors'
})
.then(res=>res.text())
.then(data=>console.log(data))
.catch(err=>console.log(err));
showCashSell();

updateDailySummary();

document.getElementById('cashCustomer').value='';

document.getElementById('cashProduct').value='';

document.getElementById('cashQty').value='';

document.getElementById('cashAmount').value='';

document.getElementById('cashAuthor').value='';

alert('Nagad Sell Saved');

}

function updateTotalDue(){

let total = 0;

customers.forEach(c=>{

total += Number(c.due);

});

document.getElementById('totalDue')
.innerText = total;

}

function updateDailySummary(){

let now = new Date();

document.getElementById('todayDate')
.innerText = now.toLocaleString();

let dueSell = 0;

transactions.forEach(t=>{

if(t.type==='Due'){

dueSell += Number(t.amount);

}

});

let nagad = 0;

cashSell.forEach(c=>{

nagad += Number(c.amount);

});

let total = dueSell + nagad;

document.getElementById('dueSell')
.innerText = dueSell;

document.getElementById('nagadSell')
.innerText = nagad;

document.getElementById('totalSell')
.innerText = total;

}

setInterval(updateDailySummary,1000);

function showDashboard(){

let s =
document.getElementById('searchCustomer')
.value.toLowerCase();

let table =
document.getElementById('dashboardTable');

table.innerHTML = `

<tr>

<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Area</th>
<th>Due</th>
<th>Action</th>

</tr>

`;

customers.forEach(c=>{

if(
c.name.toLowerCase().includes(s)
||
c.phone.includes(s)
){

table.innerHTML += `

<tr>

<td>${formatCustomerId(c.id)}</td>

<td>${c.name}</td>

<td>${c.phone}</td>

<td>${c.area}</td>

<td style="color:red;font-weight:bold;">

${c.due}

</td>

<td>

<div class="action-btn">

<button class="edit-btn"
onclick="editCustomer('${c.id}')">

Edit

</button>

<button class="delete-btn"
onclick="deleteCustomer('${c.id}')">

Delete

</button>

</div>

</td>

</tr>

`;

}

});

}
function deleteCustomer(id){

if(confirm('Delete Customer?')){

customers =
customers.filter(c=>c.id!=id);

transactions =
transactions.filter(t=>t.customerId!=id);

saveData();

loadDropdown();

showDashboard();

showTransactions();

showDueList();

showProfile();

updateTotalDue();

updateDailySummary();

alert('Deleted Successfully');

}

}

function showCashSell(){

let table =
document.getElementById('cashTable');

let date =
document.getElementById('cashFilterDate').value;

table.innerHTML = `

<tr>

<th>ID</th>
<th>Customer</th>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Author</th>
<th>Date</th>
<th>Action</th>

</tr>

`;

let total = 0;

cashSell.forEach(c=>{

let rowDate = getOnlyDate(c.date);

if(date==='' || rowDate===date){

total += Number(c.amount);

table.innerHTML += `

<tr>

<td>${c.id}</td>

<td contenteditable="false">
${c.customer}
</td>

<td contenteditable="false">
${c.product}
</td>

<td contenteditable="false">
${c.qty}
</td>

<td contenteditable="false">
${c.amount}
</td>

<td>${c.author}</td>

<td>${c.date}</td>

<td>

<div class="action-btn">

<button class="edit-btn"
onclick="enableCashEdit(this)">
Edit
</button>

<button class="save-btn"
onclick="saveCashEdit('${c.id}',this)">
Save
</button>

<button class="delete-btn"
onclick="deleteCashSell('${c.id}')">
Delete
</button>

</div>

</td>

</tr>

`;

}

});

table.innerHTML += `

<tr>

<th colspan="4">
Total
</th>

<th>${total}</th>

<th colspan="3"></th>

</tr>

`;

}

function enableCashEdit(btn){

let row =
btn.parentElement.parentElement.parentElement;

let cells = row.querySelectorAll('td');

for(let i=1;i<=4;i++){

cells[i].contentEditable = true;

cells[i].style.background='#fff3cd';

}

}

function saveCashEdit(id,btn){

let row =
btn.parentElement.parentElement.parentElement;

let cells = row.querySelectorAll('td');

let item =
cashSell.find(c=>c.id==id);

item.customer = cells[1].innerText;

item.product = cells[2].innerText;

item.qty = cells[3].innerText;

item.amount = cells[4].innerText;

saveData();

showCashSell();

updateDailySummary();

alert('Cash Sell Updated');

}

function deleteCashSell(id){

if(confirm('Delete Cash Sell?')){

cashSell =
cashSell.filter(c=>c.id!=id);

saveData();

showCashSell();

updateDailySummary();

alert('Deleted Successfully');

}

}
function showTransactions(){

let table =
document.getElementById('transactionTable');

let date =
document.getElementById('filterDate').value;

table.innerHTML = `

<tr>

<th>ID</th>
<th>Customer</th>
<th>Type</th>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Author</th>
<th>Date</th>
<th>Action</th>

</tr>

`;

transactions.forEach(t=>{

let rowDate = getOnlyDate(t.date);

if(date==='' || rowDate===date){

table.innerHTML += `

<tr>

<td>${formatTransactionId(t.id)}</td>

<td>${t.customerName}</td>

<td>${t.type}</td>

<td contenteditable="false">
${t.product}
</td>

<td contenteditable="false">
${t.qty}
</td>

<td contenteditable="false">
${t.amount}
</td>

<td>${t.author}</td>

<td>${t.date}</td>

<td>

<div class="action-btn">

<button class="edit-btn"
onclick="enableTransactionEdit(this)">
Edit
</button>

<button class="save-btn"
onclick="saveTransactionEdit('${t.id}',this)">
Save
</button>

<button class="delete-btn"
onclick="deleteTransaction('${t.id}')">
Delete
</button>

</div>

</td>

</tr>

`;

}

});

}

function enableTransactionEdit(btn){

let row =
btn.parentElement.parentElement.parentElement;

let cells = row.querySelectorAll('td');

for(let i=3;i<=5;i++){

cells[i].contentEditable = true;

cells[i].style.background='#fff3cd';

}

}

function saveTransactionEdit(id,btn){

let row =
btn.parentElement.parentElement.parentElement;

let cells = row.querySelectorAll('td');

let item =
transactions.find(t=>t.id==id);

item.product = cells[3].innerText;

item.qty = cells[4].innerText;

item.amount = cells[5].innerText;

saveData();

showTransactions();

updateDailySummary();

alert('Transaction Updated');

}

function deleteTransaction(id){

if(confirm('Delete Transaction?')){

transactions =
transactions.filter(t=>t.id!=id);

saveData();

showTransactions();

showProfile();

updateDailySummary();

alert('Deleted Successfully');

}

}

function showDueList(){

let table =
document.getElementById('dueTable');

let total = 0;

table.innerHTML = `

<tr>

<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Current Due</th>

</tr>

`;

customers.forEach(c=>{

total += Number(c.due);

function loadOnlineData(){

fetch(scriptURL)

.then(res=>res.json())

.then(data=>{

customers = [];

transactions = [];

cashSell = [];

for(let i=1;i<data.customers.length;i++){

let r = data.customers[i];

customers.push({

id:r[0],

name:r[1],

phone:r[2],

area:r[3],

due:r[4],

registerDate:r[5]

});

}

for(let i=1;i<data.transactions.length;i++){

let r = data.transactions[i];

transactions.push({

id:r[0],

customerId:r[1],

customerName:r[2],

type:r[3],

product:r[4],

qty:r[5],

amount:r[6],

author:r[7],

date:r[8]

});

}

for(let i=1;i<data.cashsell.length;i++){

let r = data.cashsell[i];

cashSell.push({

id:r[0],

customer:r[1],

product:r[2],

qty:r[3],

amount:r[4],

author:r[5],

date:r[6],

time:r[7]

});

}
loadDropdown();

showDashboard();

showTransactions();

showCashSell();

showDueList();

showProfile();

updateTotalDue();

updateDailySummary();

});

}

loadOnlineData();
